    <path class="w-cy-lt" d="M920,520 Q905,455 915,375 Q925,315 940,270 Q955,315 965,375 Q975,455 960,520 Z"/>
    <path class="ink-thin" d="M920,520 Q905,455 915,375 Q925,315 940,270 Q955,315 965,375 Q975,455 960,520"/>
  </g>

