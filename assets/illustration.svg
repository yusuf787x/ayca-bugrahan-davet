    <path class="ink-thin" d="M440,285 L760,285 M455,275 L745,275 M470,265 L730,265 M485,255 L715,255 M500,245 L700,245 M520,232 L680,232 M540,218 L660,218 M560,205 L640,205 M580,193 L620,193"/>
    <!-- body -->
