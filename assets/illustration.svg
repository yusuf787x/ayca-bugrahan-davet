      .ink      { stroke:#2b4a32; fill:none; stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round; }
      .ink-thin { stroke:#2b4a32; fill:none; stroke-width:1;   stroke-linecap:round; stroke-linejoin:round; }
      .w-cy     { fill:#5d7a47; opacity:.55; }
      .w-cy-lt  { fill:#7a9b5e; opacity:.45; }
      .w-stone  { fill:#c9b88a; opacity:.48; }
      .w-terra  { fill:#c96f4a; opacity:.55; }
      .w-lantern{ fill:#e8c547; opacity:.75; }
      .w-water  { fill:#a3c080; opacity:.38; }
      .w-wine   { fill:#7a2c3a; opacity:.65; }
      .w-bottle { fill:#3d5a3c; opacity:.62; }
      .w-leaf   { fill:#7a9b5e; opacity:.55; }
      .w-petal  { fill:#fbf4e3; opacity:.92; }
      .w-yellow { fill:#e8c547; opacity:.9;  }
      .w-shutter{ fill:#a3c080; opacity:.5;  }
      .w-label  { fill:#fbf4e3; opacity:.88; }
