    <path class="ink" d="M112,625 Q85,520 95,400 Q100,300 132,195 Q160,300 168,400 Q172,525 150,625"/>
    <path class="ink-thin" opacity="0.7" d="M120,280 Q125,285 122,295 M135,310 Q140,318 136,328 M115,360 Q118,368 114,378 M140,420 Q144,428 139,438 M120,472 Q123,480 119,490 M138,530 Q142,538 137,548 M125,572 Q129,580 124,590"/>
