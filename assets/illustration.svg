    <path class="ink" d="M440,290 L440,502 L760,502 L760,290"/>
    <!-- stone texture lines -->
    <g class="ink-thin" opacity="0.55">
      <path d="M460,320 Q475,322 490,320 M510,325 Q525,327 540,325 M560,320 Q575,322 590,320 M610,325 Q625,327 640,325 M660,320 Q675,322 690,320 M710,325 Q725,327 740,325"/>
      <path d="M450,360 Q465,362 480,360 M500,365 Q515,367 530,365 M550,360 Q565,362 580,360 M600,365 Q615,367 630,365 M650,360 Q665,362 680,360 M700,365 Q715,367 730,365"/>
      <path d="M460,410 Q475,412 490,410 M510,415 Q525,417 540,415 M560,410 Q575,412 590,410 M610,415 Q625,417 640,415 M660,410 Q675,412 690,410 M710,415 Q725,417 740,415"/>
      <path d="M450,455 Q465,457 480,455 M500,460 Q515,462 530,460 M550,455 Q565,457 580,455 M600,460 Q615,462 630,460 M650,455 Q665,457 680,455 M700,460 Q715,462 730,460"/>
