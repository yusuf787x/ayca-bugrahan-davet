        <ellipse cx="0" cy="-8" rx="3.2" ry="6.5" transform="rotate(72)"/>
        <ellipse cx="0" cy="-8" rx="3.2" ry="6.5" transform="rotate(144)"/>
        <ellipse cx="0" cy="-8" rx="3.2" ry="6.5" transform="rotate(216)"/>
