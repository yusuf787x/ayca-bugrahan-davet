<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMax slice" role="img" aria-label="Mediterrane Gartenszene mit Steinhaus, Zypressen, Brunnen und Lichterkette">
  <defs>
