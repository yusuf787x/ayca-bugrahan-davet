        <ellipse cx="0" cy="-8" rx="3.2" ry="6.5" transform="rotate(288)"/>
      </g>
      <circle class="w-yellow" r="3.2"/>
      <circle r="3.2" fill="none" stroke="#2b4a32" stroke-width=".8"/>
